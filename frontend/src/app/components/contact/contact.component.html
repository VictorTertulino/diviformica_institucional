<section id="contact" class="section-padding bg-white relative overflow-hidden">
  <!-- Ambient -->
  <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-navy-100/30 blur-[200px] rounded-full"></div>

  <div class="max-w-[1440px] mx-auto relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24">

      <!-- Left info -->
      <div class="flex flex-col justify-center">
        <span class="eyebrow mb-4 block">Contato</span>
        <h2 class="text-display-lg text-carbon-950 mb-6">
          Vamos construir<br/>algo extraordinário.
        </h2>
        <p class="text-body-lg text-carbon-500 mb-14 text-balance">
          Nossa equipe está preparada para transformar a sua visão em realidade construída com excelência.
        </p>

        <div class="space-y-8">
          <div class="flex items-start gap-5">
            <div class="w-12 h-12 rounded-xl bg-carbon-50 border border-carbon-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-carbon-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
            </div>
            <div>
              <h4 class="text-carbon-950 font-semibold text-lg mb-1">WhatsApp</h4>
              <p class="text-carbon-500">+55 63 3415-3022</p>
            </div>
          </div>

          <div class="flex items-start gap-5">
            <div class="w-12 h-12 rounded-xl bg-carbon-50 border border-carbon-100 flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-carbon-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </div>
            <div>
              <h4 class="text-carbon-950 font-semibold text-lg mb-1">Matriz</h4>
              <p class="text-carbon-500">Araguaína, Tocantins, Brasil</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right form -->
      <div class="glass-panel rounded-[2rem] p-8 md:p-12">
        <h3 class="text-xl font-display font-bold text-carbon-950 mb-8">Solicitar Orçamento</h3>

        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-xs font-semibold tracking-wide uppercase text-carbon-500 mb-2">Nome</label>
              <input type="text" formControlName="name" placeholder="Seu nome completo"
                class="w-full bg-carbon-50 border border-carbon-200 rounded-xl px-5 py-4 text-carbon-950 text-sm focus:outline-none focus:ring-2 focus:ring-navy-500/30 focus:border-navy-500 transition-all font-light placeholder:text-carbon-400">
            </div>
            <div>
              <label class="block text-xs font-semibold tracking-wide uppercase text-carbon-500 mb-2">E-mail</label>
              <input type="email" formControlName="email" placeholder="seu@email.com"
                class="w-full bg-carbon-50 border border-carbon-200 rounded-xl px-5 py-4 text-carbon-950 text-sm focus:outline-none focus:ring-2 focus:ring-navy-500/30 focus:border-navy-500 transition-all font-light placeholder:text-carbon-400">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-xs font-semibold tracking-wide uppercase text-carbon-500 mb-2">Telefone</label>
              <input type="text" formControlName="phone" placeholder="(00) 00000-0000"
                class="w-full bg-carbon-50 border border-carbon-200 rounded-xl px-5 py-4 text-carbon-950 text-sm focus:outline-none focus:ring-2 focus:ring-navy-500/30 focus:border-navy-500 transition-all font-light placeholder:text-carbon-400">
            </div>
            <div>
              <label class="block text-xs font-semibold tracking-wide uppercase text-carbon-500 mb-2">Interesse</label>
              <select formControlName="productInterest"
                class="w-full bg-carbon-50 border border-carbon-200 rounded-xl px-5 py-4 text-carbon-950 text-sm focus:outline-none focus:ring-2 focus:ring-navy-500/30 focus:border-navy-500 transition-all font-light appearance-none">
                <option value="" disabled selected class="text-carbon-400">Selecione</option>
                <option value="Divisórias">Divisórias</option>
                <option value="Forros">Forros</option>
                <option value="Pisos">Pisos Laminados</option>
                <option value="Persianas">Persianas</option>
                <option value="Construção a Seco">Construção a Seco</option>
                <option value="Isolamento">Isolamento Térmico</option>
                <option value="Parceria">Seja um Parceiro</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold tracking-wide uppercase text-carbon-500 mb-2">Mensagem</label>
            <textarea formControlName="message" rows="4" placeholder="Detalhes do seu projeto..."
              class="w-full bg-carbon-50 border border-carbon-200 rounded-xl px-5 py-4 text-carbon-950 text-sm focus:outline-none focus:ring-2 focus:ring-navy-500/30 focus:border-navy-500 transition-all font-light resize-none placeholder:text-carbon-400"></textarea>
          </div>

          <button type="submit" [disabled]="isSubmitting()"
            class="w-full md:w-auto px-8 py-4 bg-carbon-950 text-white rounded-xl font-semibold text-sm tracking-wide uppercase hover:bg-carbon-800 transition-all duration-300 disabled:opacity-50 flex items-center justify-center gap-2 mt-2">
            <span *ngIf="!isSubmitting()">Enviar Solicitação</span>
            <span *ngIf="isSubmitting()" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processando...
            </span>
          </button>

          <div *ngIf="submitMessage()" class="p-4 rounded-xl text-center text-sm font-medium"
            [ngClass]="submitError() ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-emerald-50 text-emerald-700 border border-emerald-200'">
            {{ submitMessage() }}
          </div>
        </form>
      </div>

    </div>
  </div>
</section>
