<section class="relative h-[100dvh] w-full flex items-end overflow-hidden bg-carbon-950">
  <!-- Background Image with lazy + srcset -->
  <div class="absolute inset-0 z-0">
    <img 
      src="assets/images/diviformica_hero.png"
      alt="Ambiente corporativo premium com divisórias e forros Divifórmica"
      loading="eager"
      (load)="onImageLoad()"
      class="w-full h-full object-cover object-center scale-105 transition-transform duration-[1.5s] ease-[cubic-bezier(0.16,1,0.3,1)]"
      [ngClass]="loaded() ? 'scale-100 opacity-100' : 'scale-110 opacity-0'" />
    <!-- Cinematic overlays -->
    <div class="absolute inset-0 bg-gradient-to-b from-carbon-950/30 via-transparent to-carbon-950/90"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-carbon-950/50 via-transparent to-transparent"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 max-w-[1440px] mx-auto w-full px-6 lg:px-16 xl:px-24 pb-20 md:pb-28">
    <div class="max-w-4xl">
      <!-- Eyebrow -->
      <div class="flex items-center gap-3 mb-8 opacity-0 animate-fade-up" style="animation-delay: 0.2s">
        <div class="w-12 h-[1px] bg-navy-400"></div>
        <span class="text-navy-400 text-xs font-semibold tracking-[0.3em] uppercase">Engenharia de Alto Padrão</span>
      </div>

      <!-- Title with overlapping style -->
      <h1 class="text-display-xl font-display text-white mb-8 opacity-0 animate-fade-up" style="animation-delay: 0.4s">
        Construímos o
        <span class="block text-navy-400">futuro dos espaços.</span>
      </h1>

      <!-- Subtitle -->
      <p class="text-body-lg text-white/60 max-w-xl mb-12 opacity-0 animate-fade-up" style="animation-delay: 0.6s">
        Desde 1996, especialistas em construção a seco, divisórias e soluções 
        acústicas para projetos que exigem excelência absoluta.
      </p>

      <!-- CTAs -->
      <div class="flex flex-col sm:flex-row gap-4 opacity-0 animate-fade-up" style="animation-delay: 0.8s">
        <a href="#products" 
          class="group px-8 py-4 bg-white text-carbon-950 rounded-full font-semibold text-sm tracking-wide uppercase hover:bg-champagne-50 transition-all duration-300 flex items-center gap-3">
          Explorar Linha
          <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
          </svg>
        </a>
        <a href="#contact" 
          class="px-8 py-4 glass-panel-dark text-white rounded-full font-semibold text-sm tracking-wide uppercase hover:bg-white/10 transition-all duration-300">
          Falar com Especialista
        </a>
      </div>
    </div>


  </div>
</section>
